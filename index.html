<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Snake Worksheet Generator</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { font-family: Arial; padding: 40px; }
    .controls { margin-bottom: 25px; display: flex; flex-direction: column; gap: 14px; }
    .row { display: flex; flex-wrap: wrap; gap: 14px 18px; align-items: center; }
    .row > div { display: flex; align-items: center; gap: 8px; }
    input[type="number"] { width: 140px; }
    button { padding: 8px 14px; font-size: 14px; }
    .hint { color: #555; font-size: 12px; margin-top: 2px; }
    .status { margin-top: 8px; color: #b00020; font-size: 13px; min-height: 18px; }
    .ops { display: flex; flex-wrap: wrap; gap: 10px 16px; align-items: center; }
    .ops label { display: inline-flex; align-items: center; gap: 8px; }
  </style>
</head>

<body>
  <h1>Snake Worksheet Generator</h1>

  <div class="controls">

    <div class="row">
      <div>
        <label for="minBound">Min Bound</label>
        <input id="minBound" type="number" placeholder="(blank = no min)" />
      </div>

      <div>
        <label for="maxBound">Max Bound</label>
        <input id="maxBound" type="number" placeholder="(blank = no max)" />
      </div>
    </div>

    <div class="row">
      <div>
        <label for="maxAddSub">Max Add/Sub Amount</label>
        <input id="maxAddSub" type="number" min="1" step="1" placeholder="e.g. 10" />
      </div>

      <div>
        <label for="maxMul">Max Multiply Factor</label>
        <input id="maxMul" type="number" min="2" step="1" placeholder="e.g. 6" />
      </div>

      <div>
        <label for="maxDiv">Max Divide Divisor</label>
        <input id="maxDiv" type="number" min="2" step="1" placeholder="e.g. 6" />
      </div>
    </div>

    <div class="row ops">
      <span>Allowed operations:</span>
      <label><input id="allowAdd" type="checkbox" checked /> Addition</label>
      <label><input id="allowSub" type="checkbox" checked /> Subtraction</label>
      <label><input id="allowMul" type="checkbox" /> Multiplication</label>
      <label><input id="allowDiv" type="checkbox" /> Division</label>

      <button onclick="generate()">Generate Puzzle</button>
      <button onclick="window.print()">Print</button>
    </div>

    <div class="hint">
      Tip: If you check an operation, you must also enter its max (Add/Sub ≥ 1; Multiply/Divide ≥ 2).
    </div>
    <div id="status" class="status"></div>
  </div>

  <div id="worksheet"></div>

  <script src="snakeLayouts.js"></script>
  <script src="generator.js"></script>
</body>
</html>
